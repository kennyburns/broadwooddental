<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Broadwood Dental — Dental Implants &amp; Aesthetics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400;500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #d4a017;
    --white: #ffffff;
  }

  html, body {
    height: 100%;
    font-family: 'Jost', sans-serif;
  }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #1c1c1c;
    position: relative;
    overflow: hidden;
    padding: 2rem;
  }

  .bg {
    position: fixed;
    inset: 0;
    background-image: url('https://images.unsplash.com/photo-1629909615184-74f495363b67?w=1600&q=80');
    background-size: cover;
    background-position: center;
    filter: grayscale(40%);
    opacity: 0.25;
    z-index: 0;
  }

  .vignette {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 20%, rgba(0,0,0,0.75) 100%);
    z-index: 1;
  }

  .card {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 520px;
    text-align: center;
    animation: fadeUp 0.9s ease forwards;
    opacity: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
    margin-bottom: 2rem;
  }

  .logo-name {
    font-family: 'Raleway', sans-serif;
    font-size: clamp(1.6rem, 6vw, 2.4rem);
    font-weight: 300;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    line-height: 1;
  }

  .logo-sub {
    font-size: 0.6rem;
    font-weight: 400;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
  }

  .divider {
    width: 50px;
    height: 1px;
    background: rgba(212,160,23,0.5);
    margin: 0 auto 2rem;
  }

  .tagline {
    font-family: 'Raleway', sans-serif;
    font-size: clamp(0.95rem, 3vw, 1.1rem);
    font-weight: 300;
    font-style: italic;
    color: rgba(255,255,255,0.6);
    margin-bottom: 0.5rem;
  }

  .coming-soon {
    font-size: 0.62rem;
    font-weight: 500;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 2.5rem;
  }

  .contact-block {
    display: flex;
    flex-direction: column;
    gap: 0;
    border: 1px solid rgba(212,160,23,0.2);
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  .contact-item {
    display: flex;
    align-items: flex-start;
    gap: 0.9rem;
    text-align: left;
    padding: 1.25rem 1.75rem;
  }

  .contact-item + .contact-item {
    border-top: 1px solid rgba(212,160,23,0.12);
  }

  .contact-item svg {
    width: 15px;
    height: 15px;
    color: var(--gold);
    flex-shrink: 0;
    margin-top: 4px;
  }

  .contact-label {
    font-size: 0.58rem;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 3px;
  }

  .contact-value {
    font-size: 0.85rem;
    font-weight: 300;
    color: rgba(255,255,255,0.72);
    line-height: 1.5;
    text-decoration: none;
    transition: color 0.2s;
    display: block;
  }

  a.contact-value:hover { color: var(--white); }

  .footer-note {
    margin-top: 1.8rem;
    font-size: 0.65rem;
    font-weight: 300;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.18);
  }

  @media (max-width: 420px) {
    .contact-item { padding: 1rem 1.25rem; }
  }
</style>
</head>
<body>

<div class="bg"></div>
<div class="vignette"></div>

<div class="card">

  <div class="logo-wrap">
    <div class="logo-name">Broadwood Dental</div>
    <div class="logo-sub">Dental Implants &amp; Aesthetics</div>
  </div>

  <div class="divider"></div>

  <p class="tagline">Our new website is on its way.</p>
  <div class="coming-soon">Coming Soon</div>

  <div class="contact-block">

    <div class="contact-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
      </svg>
      <div>
        <div class="contact-label">Phone</div>
        <a class="contact-value" href="tel:01236907481">01236 907481</a>
      </div>
    </div>

    <div class="contact-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
      </svg>
      <div>
        <div class="contact-label">Email</div>
        <a class="contact-value" href="mailto:info@broadwooddental.co.uk">info@broadwooddental.co.uk</a>
      </div>
    </div>

    <div class="contact-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M17.657 16.657L13.414 20.9a2 2 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><circle cx="12" cy="11" r="3"/>
      </svg>
      <div>
        <div class="contact-label">Address</div>
        <span class="contact-value">4 St Maurice's Gate, Cumbernauld<br>Glasgow G68 9FW</span>
      </div>
    </div>

  </div>

  <p class="footer-note">&copy; 2025 Broadwood Dental. All rights reserved.</p>

</div>

</body>
</html>
